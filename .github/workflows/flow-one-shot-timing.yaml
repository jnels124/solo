name: "One-Shot Timing Test"

on:
  workflow_dispatch:
    inputs:
      use-released-solo:
        description: "Use latest released Solo CLI (true) or build from source (false)"
        type: boolean
        required: false
        default: false
      use-local-build:
        description: "Build consensus node from source using --local-build-path"
        type: boolean
        required: false
        default: false
      consensus-node-version:
        description: "Consensus node version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      block-node-version:
        description: "Block node chart version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      mirror-node-version:
        description: "Mirror node version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      relay-version:
        description: "JSON RPC Relay version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      explorer-version:
        description: "Explorer version (leave empty for version.ts default)"
        type: string
        required: false
        default: ""
      cycles:
        description: "Number of cold/warm cycles to run"
        type: number
        required: false
        default: 3

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  STEP_TIMEOUT_MINUTES: '5'

jobs:
  one-shot-timing:
    timeout-minutes: 420
    runs-on: hiero-solo-linux-large
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        uses: step-security/retry@38808b4332b98bb36ca031abff0c100231608288 # v4.0.0
        with:
          max_attempts: 10
          timeout_minutes: 10
          command: npm ci

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Solo CLI (released)
        if: ${{ inputs.use-released-solo == true }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: npm i @hashgraph/solo@latest

      - name: Compile Project (from source)
        if: ${{ inputs.use-released-solo != true }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: task build:compile

      - name: Set Solo Command
        id: solo-cmd
        run: |
          if [ "${{ inputs.use-released-solo }}" = "true" ]; then
            echo "cmd=npx @hashgraph/solo" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=npm run solo --" >> "$GITHUB_OUTPUT"
          fi

      - name: Solo Init
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          ${{ steps.solo-cmd.outputs.cmd }} init --dev
          export PATH=~/.solo/bin:${PATH}

      - name: Resolve Versions
        id: versions
        run: |
          # Read defaults from version.ts and allow input overrides
          DEFAULT_CN=$(awk -F"'" '/^export const HEDERA_PLATFORM_VERSION/ {print $(NF-1); exit}' version.ts)
          DEFAULT_BN=$(awk -F"'" '/^export const BLOCK_NODE_VERSION/ {print $(NF-1); exit}' version.ts)
          DEFAULT_MN=$(awk -F"'" '/^export const MIRROR_NODE_VERSION/ {print $(NF-1); exit}' version.ts)
          DEFAULT_RELAY=$(awk -F"'" '/^export const HEDERA_JSON_RPC_RELAY_VERSION/ {print $(NF-1); exit}' version.ts)
          DEFAULT_EXPLORER=$(awk -F"'" '/^export const EXPLORER_VERSION/ {print $(NF-1); exit}' version.ts)

          CN_VERSION="${{ inputs.consensus-node-version }}"
          BN_VERSION="${{ inputs.block-node-version }}"
          MN_VERSION="${{ inputs.mirror-node-version }}"
          RELAY_VERSION="${{ inputs.relay-version }}"
          EXPLORER_VERSION="${{ inputs.explorer-version }}"

          echo "cn-version=${CN_VERSION:-$DEFAULT_CN}" >> "$GITHUB_OUTPUT"
          echo "bn-version=${BN_VERSION:-$DEFAULT_BN}" >> "$GITHUB_OUTPUT"
          echo "mn-version=${MN_VERSION:-$DEFAULT_MN}" >> "$GITHUB_OUTPUT"
          echo "relay-version=${RELAY_VERSION:-$DEFAULT_RELAY}" >> "$GITHUB_OUTPUT"
          echo "explorer-version=${EXPLORER_VERSION:-$DEFAULT_EXPLORER}" >> "$GITHUB_OUTPUT"

          echo "### Resolved Versions" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Consensus Node | ${CN_VERSION:-$DEFAULT_CN} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Block Node | ${BN_VERSION:-$DEFAULT_BN} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mirror Node | ${MN_VERSION:-$DEFAULT_MN} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Relay | ${RELAY_VERSION:-$DEFAULT_RELAY} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Explorer | ${EXPLORER_VERSION:-$DEFAULT_EXPLORER} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Java and Gradle (for local build)
        if: ${{ inputs.use-local-build == true }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Checkout and Build Consensus Node (local build)
        if: ${{ inputs.use-local-build == true }}
        timeout-minutes: 30
        run: |
          CN_VERSION="${{ steps.versions.outputs.cn-version }}"
          echo "Building consensus node at version: $CN_VERSION"

          CN_REPO_DIR="${GITHUB_WORKSPACE}/../hiero-consensus-node"

          git clone https://github.com/hiero-ledger/hiero-consensus-node.git \
            --depth 1 --branch "$CN_VERSION" "$CN_REPO_DIR" 2>/dev/null || \
          git clone https://github.com/hiero-ledger/hiero-consensus-node.git \
            --depth 1 --branch "refs/tags/$CN_VERSION" "$CN_REPO_DIR"

          cd "$CN_REPO_DIR"
          LOG_FILE="/tmp/consensus-node-build.log"
          ./gradlew assemble --stacktrace --info > "$LOG_FILE" 2>&1 || {
            echo "Build failed. Last 100 lines:"
            tail -100 "$LOG_FILE"
            exit 1
          }
          echo "Consensus node build complete."

      - name: Generate Values File
        id: values-file
        run: |
          VALUES_FILE="/tmp/one-shot-timing-values.yaml"
          {
            echo "network:"
            echo "  --release-tag: \"${{ steps.versions.outputs.cn-version }}\""
            echo "  --tss: \"true\""
            echo ""
            if [ "${{ inputs.use-local-build }}" = "true" ]; then
              CN_REPO_DIR="${GITHUB_WORKSPACE}/../hiero-consensus-node"
              echo "setup:"
              echo "  --local-build-path: \"${CN_REPO_DIR}/hedera-node/data\""
              echo "  --release-tag: \"${{ steps.versions.outputs.cn-version }}\""
              echo ""
            fi
            echo "blockNode:"
            echo "  --chart-version: \"${{ steps.versions.outputs.bn-version }}\""
            echo "  --release-tag: \"${{ steps.versions.outputs.cn-version }}\""
            echo ""
            echo "mirrorNode:"
            echo "  --mirror-node-version: \"${{ steps.versions.outputs.mn-version }}\""
            echo ""
            echo "relayNode:"
            echo "  --relay-release: \"${{ steps.versions.outputs.relay-version }}\""
            echo ""
            echo "explorerNode:"
            echo "  --explorer-version: \"${{ steps.versions.outputs.explorer-version }}\""
          } > "$VALUES_FILE"
          echo "Generated values file:"
          cat "$VALUES_FILE"
          echo "path=$VALUES_FILE" >> "$GITHUB_OUTPUT"

      - name: System Calibration
        id: calibration
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          echo "==== System Calibration ===="
          CALIBRATION_START=$SECONDS
          tar -czf /dev/null /usr 2>/dev/null
          BASELINE=$(( SECONDS - CALIBRATION_START ))
          echo "baseline=${BASELINE}" >> "$GITHUB_OUTPUT"
          echo "Runner calibration (tar /usr): ${BASELINE}s"
          if [ "$BASELINE" -gt 20 ]; then
            echo "::warning::Runner appears slow (calibration=${BASELINE}s). Timing results may be unreliable."
          fi

      - name: "Cold/Warm Cycles (${{ inputs.cycles || 3 }} iterations)"
        id: timing-cycles
        timeout-minutes: 360
        env:
          ONE_SHOT_WITH_BLOCK_NODE: true
        run: |
          export PATH=~/.solo/bin:${PATH}
          SOLO_CMD="${{ steps.solo-cmd.outputs.cmd }}"
          VALUES_FILE="${{ steps.values-file.outputs.path }}"

          delete_clusters() {
            for cluster in $(kind get clusters 2>/dev/null); do
              kind delete cluster -n "$cluster"
            done
          }

          CYCLES=${{ inputs.cycles || 3 }}
          COLD_SAMPLES=()
          WARM_SAMPLES=()

          for i in $(seq 1 "$CYCLES"); do
            echo "==== Cycle ${i}/${CYCLES} ===="

            echo "-- Cold start --"
            COLD_SAMPLE_START=$SECONDS
            $SOLO_CMD one-shot falcon deploy --values-file "$VALUES_FILE"
            COLD_ELAPSED=$(( SECONDS - COLD_SAMPLE_START ))
            COLD_SAMPLES+=("$COLD_ELAPSED")
            echo "Cold ${i}: $(( COLD_ELAPSED / 60 ))m $(( COLD_ELAPSED % 60 ))s (${COLD_ELAPSED}s)"

            $SOLO_CMD one-shot falcon destroy -q

            echo "-- Warm start --"
            WARM_SAMPLE_START=$SECONDS
            $SOLO_CMD one-shot falcon deploy --values-file "$VALUES_FILE"
            WARM_ELAPSED=$(( SECONDS - WARM_SAMPLE_START ))
            WARM_SAMPLES+=("$WARM_ELAPSED")
            echo "Warm ${i}: $(( WARM_ELAPSED / 60 ))m $(( WARM_ELAPSED % 60 ))s (${WARM_ELAPSED}s)"

            if [ "$i" -lt "$CYCLES" ]; then
              $SOLO_CMD one-shot falcon destroy -q
              delete_clusters
            fi
          done

          MEDIAN_IDX=$(( (CYCLES - 1) / 2 ))

          IFS=$'\n' COLD_SORTED=($(printf '%s\n' "${COLD_SAMPLES[@]}" | sort -n)); unset IFS
          COLD_MIN=${COLD_SORTED[0]}
          COLD_MEDIAN=${COLD_SORTED[$MEDIAN_IDX]}
          COLD_MAX=${COLD_SORTED[$CYCLES - 1]}

          IFS=$'\n' WARM_SORTED=($(printf '%s\n' "${WARM_SAMPLES[@]}" | sort -n)); unset IFS
          WARM_MIN=${WARM_SORTED[0]}
          WARM_MEDIAN=${WARM_SORTED[$MEDIAN_IDX]}
          WARM_MAX=${WARM_SORTED[$CYCLES - 1]}

          echo "cold-elapsed=${COLD_MEDIAN}" >> "$GITHUB_OUTPUT"
          echo "cold-min=${COLD_MIN}" >> "$GITHUB_OUTPUT"
          echo "cold-median=${COLD_MEDIAN}" >> "$GITHUB_OUTPUT"
          echo "cold-max=${COLD_MAX}" >> "$GITHUB_OUTPUT"
          echo "cold-samples=${COLD_SAMPLES[*]}" >> "$GITHUB_OUTPUT"

          echo "warm-elapsed=${WARM_MEDIAN}" >> "$GITHUB_OUTPUT"
          echo "warm-min=${WARM_MIN}" >> "$GITHUB_OUTPUT"
          echo "warm-median=${WARM_MEDIAN}" >> "$GITHUB_OUTPUT"
          echo "warm-max=${WARM_MAX}" >> "$GITHUB_OUTPUT"
          echo "warm-samples=${WARM_SAMPLES[*]}" >> "$GITHUB_OUTPUT"

          echo "==== Cold median: $(( COLD_MEDIAN / 60 ))m $(( COLD_MEDIAN % 60 ))s ===="
          echo "==== Warm median: $(( WARM_MEDIAN / 60 ))m $(( WARM_MEDIAN % 60 ))s ===="

      - name: Timing Summary
        id: timing-summary
        if: ${{ !cancelled() }}
        run: |
          COLD_MEDIAN="${{ steps.timing-cycles.outputs.cold-median }}"
          COLD_MIN="${{ steps.timing-cycles.outputs.cold-min }}"
          COLD_MAX="${{ steps.timing-cycles.outputs.cold-max }}"
          COLD_SAMPLES="${{ steps.timing-cycles.outputs.cold-samples }}"
          WARM_MEDIAN="${{ steps.timing-cycles.outputs.warm-median }}"
          WARM_MIN="${{ steps.timing-cycles.outputs.warm-min }}"
          WARM_MAX="${{ steps.timing-cycles.outputs.warm-max }}"
          WARM_SAMPLES="${{ steps.timing-cycles.outputs.warm-samples }}"
          BASELINE="${{ steps.calibration.outputs.baseline }}"

          echo "### One-Shot Timing Results (${{ inputs.cycles || 3 }} cycles)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Duration |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|----------|" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$BASELINE" ]; then
            echo "| Runner Calibration (tar /usr) | ${BASELINE}s |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$COLD_MEDIAN" ]; then
            echo "| Cold Start (median) | $(( COLD_MEDIAN / 60 ))m $(( COLD_MEDIAN % 60 ))s (${COLD_MEDIAN}s) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Cold Start min | $(( COLD_MIN / 60 ))m $(( COLD_MIN % 60 ))s (${COLD_MIN}s) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Cold Start max | $(( COLD_MAX / 60 ))m $(( COLD_MAX % 60 ))s (${COLD_MAX}s) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Cold Start samples | ${COLD_SAMPLES} |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Cold Start | Failed |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "$WARM_MEDIAN" ]; then
            echo "| Warm Start (median) | $(( WARM_MEDIAN / 60 ))m $(( WARM_MEDIAN % 60 ))s (${WARM_MEDIAN}s) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Warm Start min | $(( WARM_MIN / 60 ))m $(( WARM_MIN % 60 ))s (${WARM_MIN}s) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Warm Start max | $(( WARM_MAX / 60 ))m $(( WARM_MAX % 60 ))s (${WARM_MAX}s) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Warm Start samples | ${WARM_SAMPLES} |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Warm Start | Failed or skipped |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Calculate and output improvement
          if [ -n "$COLD_MEDIAN" ] && [ -n "$WARM_MEDIAN" ]; then
            DIFF=$(( COLD_MEDIAN - WARM_MEDIAN ))
            echo "improvement-diff=${DIFF}" >> "$GITHUB_OUTPUT"

            if [ "$DIFF" -gt 0 ]; then
              echo "| Improvement (cold vs warm median) | ${DIFF}s faster on warm start |" >> "$GITHUB_STEP_SUMMARY"
              echo "improvement-direction=faster" >> "$GITHUB_OUTPUT"
            elif [ "$DIFF" -lt 0 ]; then
              DELTA=$(( -DIFF ))
              echo "| Improvement (cold vs warm median) | ${DELTA}s slower on warm start |" >> "$GITHUB_STEP_SUMMARY"
              echo "improvement-direction=slower" >> "$GITHUB_OUTPUT"
            else
              echo "| Improvement (cold vs warm median) | No difference between cold and warm start |" >> "$GITHUB_STEP_SUMMARY"
              echo "improvement-direction=same" >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Configuration:** use-released-solo=${{ inputs.use-released-solo }}, use-local-build=${{ inputs.use-local-build }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Format Slack Table
        id: slack-table
        if: ${{ !cancelled() }}
        run: |
          COLD_MEDIAN="${{ steps.timing-cycles.outputs.cold-median }}"
          COLD_MIN="${{ steps.timing-cycles.outputs.cold-min }}"
          COLD_MAX="${{ steps.timing-cycles.outputs.cold-max }}"
          COLD_SAMPLES="${{ steps.timing-cycles.outputs.cold-samples }}"
          WARM_MEDIAN="${{ steps.timing-cycles.outputs.warm-median }}"
          WARM_MIN="${{ steps.timing-cycles.outputs.warm-min }}"
          WARM_MAX="${{ steps.timing-cycles.outputs.warm-max }}"
          WARM_SAMPLES="${{ steps.timing-cycles.outputs.warm-samples }}"
          BASELINE="${{ steps.calibration.outputs.baseline }}"
          IMPROVEMENT_DIFF="${{ steps.timing-summary.outputs.improvement-diff }}"
          IMPROVEMENT_DIR="${{ steps.timing-summary.outputs.improvement-direction }}"

          TABLE="\`\`\`"
          TABLE="${TABLE}"$'\n'"Metric                          | Duration"
          TABLE="${TABLE}"$'\n'"----------------------------------------------------"

          if [ -n "$BASELINE" ]; then
            TABLE="${TABLE}"$'\n'"Runner Calibration (tar /usr) | ${BASELINE}s"
          fi

          if [ -n "$COLD_MEDIAN" ]; then
            TABLE="${TABLE}"$'\n'"Cold Start (median)           | $(( COLD_MEDIAN / 60 ))m $(( COLD_MEDIAN % 60 ))s (${COLD_MEDIAN}s)"
            TABLE="${TABLE}"$'\n'"Cold Start min                | $(( COLD_MIN / 60 ))m $(( COLD_MIN % 60 ))s (${COLD_MIN}s)"
            TABLE="${TABLE}"$'\n'"Cold Start max                | $(( COLD_MAX / 60 ))m $(( COLD_MAX % 60 ))s (${COLD_MAX}s)"
            TABLE="${TABLE}"$'\n'"Cold Start samples            | ${COLD_SAMPLES}"
          else
            TABLE="${TABLE}"$'\n'"Cold Start | Failed"
          fi

          if [ -n "$WARM_MEDIAN" ]; then
            TABLE="${TABLE}"$'\n'"Warm Start (median)           | $(( WARM_MEDIAN / 60 ))m $(( WARM_MEDIAN % 60 ))s (${WARM_MEDIAN}s)"
            TABLE="${TABLE}"$'\n'"Warm Start min                | $(( WARM_MIN / 60 ))m $(( WARM_MIN % 60 ))s (${WARM_MIN}s)"
            TABLE="${TABLE}"$'\n'"Warm Start max                | $(( WARM_MAX / 60 ))m $(( WARM_MAX % 60 ))s (${WARM_MAX}s)"
            TABLE="${TABLE}"$'\n'"Warm Start samples            | ${WARM_SAMPLES}"
          else
            TABLE="${TABLE}"$'\n'"Warm Start | Failed or skipped"
          fi

          if [ -n "$IMPROVEMENT_DIFF" ] && [ -n "$IMPROVEMENT_DIR" ]; then
            TABLE="${TABLE}"$'\n'"Improvement (median)          | ${IMPROVEMENT_DIFF}s ${IMPROVEMENT_DIR} on warm start"
          fi

          TABLE="${TABLE}"$'\n'"\`\`\`"

          # Output with proper escaping for multiline
          echo "table<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TABLE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Send Slack Notification
        if: ${{ !cancelled() }}
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK }}
          SLACK_MSG_AUTHOR: Release Engineering
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: One-Shot Timing Results
          SLACK_MESSAGE: |
            ${{ steps.slack-table.outputs.table }}

            *Branch:* `${{ github.ref_name }}`
            *Config:* use-released-solo=${{ inputs.use-released-solo }}, use-local-build=${{ inputs.use-local-build }}

            :link: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Job Logs>
          SLACK_FOOTER: ${{ github.workflow }}

      - name: Collect Diagnostics on Failure
        if: ${{ failure() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          export PATH=~/.solo/bin:${PATH}
          SOLO_CMD="${{ steps.solo-cmd.outputs.cmd }}"
          $SOLO_CMD deployment diagnostics logs -q --dev || true

      - name: Upload Logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: one-shot-timing-logs
          path: ~/.solo/logs/*
          overwrite: true
          if-no-files-found: warn

      - name: Final Cleanup
        if: always()
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          export PATH=~/.solo/bin:${PATH}
          SOLO_CMD="${{ steps.solo-cmd.outputs.cmd }}"
          $SOLO_CMD one-shot falcon destroy -q || true
