name: "Trigger Homebrew Update"

on:
  workflow_run:
    workflows:
      - "Deploy Release Artifact"
    types:
      - completed

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  trigger-homebrew-update:
    name: Trigger Homebrew Formula Update
    runs-on: hiero-solo-linux-medium
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Get Latest Release Version
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          WORKFLOW_RUN_CREATED_AT: ${{ github.event.workflow_run.created_at }}
        run: |
          RELEASE_JSON=$(gh release view --repo "${{ github.repository }}" --json tagName,createdAt 2>/dev/null || echo "")
          if [[ -z "${RELEASE_JSON}" ]]; then
            echo "::notice::No GitHub release found; skipping homebrew update (possibly a dry run)"
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          RELEASE_CREATED_AT=$(echo "${RELEASE_JSON}" | jq -r '.createdAt')
          TAG_NAME=$(echo "${RELEASE_JSON}" | jq -r '.tagName')
          # Normalize tags like "v0.64.0" to "0.64.0" for Homebrew input.
          VERSION="${TAG_NAME#v}"

          # Only proceed if the release was published after this workflow run started,
          # which means the release was actually triggered by this run (not a dry run).
          WORKFLOW_RUN_TS=$(date -d "${WORKFLOW_RUN_CREATED_AT}" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "${WORKFLOW_RUN_CREATED_AT}" +%s)
          RELEASE_TS=$(date -d "${RELEASE_CREATED_AT}" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "${RELEASE_CREATED_AT}" +%s)

          if [[ "${RELEASE_TS}" -lt "${WORKFLOW_RUN_TS}" ]]; then
            echo "::notice::Latest release (${TAG_NAME}, created ${RELEASE_CREATED_AT}) predates this workflow run; skipping homebrew update (possibly a dry run)"
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "skip=false" >> "${GITHUB_OUTPUT}"
          echo "Latest release version: ${VERSION} (created ${RELEASE_CREATED_AT})"

      - name: Trigger Homebrew Update Workflow
        if: ${{ steps.get-version.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          gh workflow run update-solo-formula.yml \
            --repo hiero-ledger/homebrew-tools \
            --field version=${{ steps.get-version.outputs.version }}
          echo "::notice::Triggered homebrew update for version ${{ steps.get-version.outputs.version }}"
