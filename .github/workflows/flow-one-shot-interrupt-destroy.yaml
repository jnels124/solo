name: "One Shot Interrupt Destroy"

on:
  workflow_dispatch:
    inputs:
      node-version:
        description: "NodeJS Version:"
        type: string
        required: false
        default: "22"
      released-or-latest:
        description: "Use released or latest version"
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      node-version:
        description: "NodeJS Version:"
        type: string
        required: false
        default: "22"
      released-or-latest:
        description: "Use released or latest version"
        type: boolean
        required: false
        default: false

defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

jobs:
  test-one-shot-interrupt-destroy:
    name: Interrupt=${{ matrix.interrupt_seconds }}s
    runs-on: hiero-solo-linux-large
    timeout-minutes: 80
    strategy:
      fail-fast: false
      matrix:
        interrupt_seconds: [30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330, 360, 390, 420]
      max-parallel: 2

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version || '22' }}
          cache: npm

      - name: Install Dependencies
        uses: step-security/retry@38808b4332b98bb36ca031abff0c100231608288 # v4.0.0
        with:
          max_attempts: 10
          timeout_minutes: 10
          command: npm ci

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Application
        run: task build:compile

      - name: Run Interrupt Workflow Script
        timeout-minutes: 60
        env:
          ONE_SHOT_WITH_BLOCK_NODE: true
        run: |
          export PATH=~/.solo/bin:${PATH}
          if [ "${{ inputs.released-or-latest || 'false' }}" = "true" ]; then
            export SOLO_COMMAND="npx @hashgraph/solo"
          else
            export SOLO_COMMAND="npm run solo --"
          fi
          export INTERRUPT_SECONDS="${{ matrix.interrupt_seconds }}"
          node .github/workflows/script/one-shot-interrupt-destroy.mjs

      - name: Cleanup Deployment
        if: always()
        timeout-minutes: 15
        env:
          ONE_SHOT_WITH_BLOCK_NODE: true
        run: |
          export PATH=~/.solo/bin:${PATH}
          if [ "${{ inputs.released-or-latest || 'false' }}" = "true" ]; then
            npx @hashgraph/solo one-shot single destroy --quiet-mode
          else
            npm run solo -- one-shot single destroy --quiet-mode
          fi
