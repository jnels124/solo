name: "Test GCS as Bucket Storage"

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
concurrency:
  # One run per PR or per branch. A new push cancels any in-progress run for
  # the same PR/branch, saving runner resources. workflow_dispatch runs are
  # not cancelled — each manual trigger gets its own group via run_id.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'auto' }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  id-token: write
  contents: read
  actions: read

env:
  STEP_TIMEOUT_MINUTES: '5'
  KIND_DOCKER_REGISTRY_MIRRORS: ${{ vars.KIND_DOCKER_REGISTRY_MIRRORS }}

jobs:
  gcs-storage-test:
    name: "GCS Storage Test - ${{ matrix.storageType }}"
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    timeout-minutes: 40
    runs-on: hiero-solo-linux-large
    strategy:
      fail-fast: false
      matrix:
        storageType: [ "gcs_only", "minio_only" ]
      max-parallel: 1
    steps:
      - name: Check if job should be skipped
        id: check
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          if [[ "${{ github.actor }}" == "dependabot[bot]" || "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
            echo "run=false" >> $GITHUB_OUTPUT
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

      - name: Harden Runner
        if: ${{ steps.check.outputs.run == 'true' && !cancelled() && !failure() }}
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          egress-policy: audit

      - name: Checkout Code
        if: ${{ steps.check.outputs.run == 'true' && !cancelled() && !failure() }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Authenticate to Google Cloud
        if: ${{ steps.check.outputs.run == 'true' && !cancelled() && !failure() }}
        id: google-auth
        uses: step-security/google-github-auth@775fc4c80760272ef389c9f9f8d98de7db0c170d # v3.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          workload_identity_provider: "projects/652966097426/locations/global/workloadIdentityPools/solo-bucket-dev-pool/providers/gh-provider"
          service_account: "solo-bucket-reader-writer@solo-bucket-dev.iam.gserviceaccount.com"

      - name: Setup Google Cloud SDK
        if: ${{ steps.check.outputs.run == 'true' && !cancelled() && !failure() }}
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Get Current Job Log URL
        if: ${{ steps.check.outputs.run == 'true' && !cancelled() && !failure() }}
        uses: Tiryoh/gha-jobid-action@be260d8673c9211a84cdcf37794ebd654ba81eef # v1.4.0
        id: jobs
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          job_name: "GCS Storage Test - ${{ matrix.storageType }}"

      - name: Create Bucket Name and Prefix
        if: ${{ steps.check.outputs.run == 'true' && !cancelled() && !failure() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          export BUCKET_NAME="solo-ci-test-streams"
          export PREFIX=${{ steps.jobs.outputs.job_id }}

          echo "BUCKET_NAME=${BUCKET_NAME}" >> $GITHUB_ENV
          echo "PREFIX=${PREFIX}" >> $GITHUB_ENV          
          
          export BACKUP_BUCKET_NAME="solo-ci-backups"
          echo "BACKUP_BUCKET_NAME=${BACKUP_BUCKET_NAME}" >> $GITHUB_ENV

      - name: Setup Node
        if: ${{ steps.check.outputs.run == 'true' && !cancelled() && !failure() }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: 22
          cache: npm

      - name: Configure npm registry
        if: ${{ steps.check.outputs.run == 'true' && !cancelled() && !failure() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: echo "registry=https://registry.npmjs.org/" > .npmrc

      - name: Install Task
        if: ${{ steps.check.outputs.run == 'true' && !cancelled() && !failure() }}
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        if: ${{ steps.check.outputs.run == 'true' && !cancelled() && !failure() }}
        id: npm-deps
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          npm ci
          npm install -g @hashgraph/solo

      - name: Compile Project
        if: ${{ steps.check.outputs.run == 'true' && !cancelled() && !failure() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: task build:compile

      - name: Run GCS Test Script for type ${{ matrix.storageType }}
        id: run-gcs-script
        if: ${{ steps.check.outputs.run == 'true' && !cancelled() && !failure() }}
        env:
          GCS_ACCESS_KEY: ${{ secrets.GCP_S3_ACCESS_KEY }}
          GCS_SECRET_KEY: ${{ secrets.GCP_S3_SECRET_KEY }}
          BUCKET_NAME: ${{ env.BUCKET_NAME }}
          PREFIX: ${{ env.PREFIX }}
          BACKUP_BUCKET_NAME: ${{ env.BACKUP_BUCKET_NAME }}/${{ steps.jobs.outputs.job_id }}
          STORAGE_TYPE: ${{ matrix.storageType }}
          GCP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GCP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          export PATH=~/.solo/bin:${PATH}
          .github/workflows/script/gcs_test.sh || RC=$? || true
          if [[ "${RC}" != "0" ]]; then
            echo "GCS test failed with exit code ${RC}"
            npm run solo-test -- deployment diagnostics logs --deployment solo-e2e -q --dev || true
            exit ${RC}
          fi

      - name: Upload Logs to GitHub
        if: ${{ steps.check.outputs.run == 'true' && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: solo-logs-${{ matrix.storageType }}
          path: ~/.solo/logs/*
          if-no-files-found: error

      - name: Delete test objects from GCS buckets
        # Always attempt cleanup for object-store test modes, even if prior steps failed.
        if: ${{ steps.check.outputs.run == 'true' && always() && (matrix.storageType == 'gcs_only' || matrix.storageType == 'aws_only') }}
        continue-on-error: true
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          PROJECT_ID="${{ vars.GCP_S3_PROJECT_ID }}"
          JOB_PREFIX="${{ steps.jobs.outputs.job_id }}"

          # Guardrails: never allow accidental bucket-root cleanup.
          if [[ -z "${JOB_PREFIX}" ]]; then
            echo "Job prefix is empty; skipping cleanup to avoid deleting bucket root"
            exit 0
          fi

          if [[ ! "${JOB_PREFIX}" =~ ^[0-9]+$ ]]; then
            echo "Job prefix '${JOB_PREFIX}' is not a CI job id; skipping cleanup for safety"
            exit 0
          fi

          cleanup_prefix() {
            local bucket_name="$1"
            local target="gs://${bucket_name}/${JOB_PREFIX}"
            local deleted=1
            local has_objects=""

            echo "Attempting cleanup for ${target}"

            has_objects="$(
              gcloud storage objects list "${target}/" --project="${PROJECT_ID}" --limit=1 --format='value(name)' \
                2>/dev/null || true
            )"

            if [[ -z "${has_objects}" ]]; then
              echo "No objects found for ${target}, skipping"
              return 0
            fi

            for attempt in 1 2 3; do
              if gcloud storage rm --recursive "${target}" --project="${PROJECT_ID}"; then
                echo "Cleanup successful for ${target}"
                deleted=0
                break
              fi
              echo "Cleanup attempt ${attempt}/3 failed for ${target}"
              sleep $((attempt * 2))
            done

            if [[ ${deleted} -ne 0 ]]; then
              echo "Cleanup failed for ${target} after 3 attempts"
              return 1
            fi
          }

          cleanup_rc=0
          cleanup_prefix "${BUCKET_NAME}" || cleanup_rc=1
          cleanup_prefix "${BACKUP_BUCKET_NAME}" || cleanup_rc=1
          exit "${cleanup_rc}"
