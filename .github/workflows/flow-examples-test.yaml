name: "Test Examples"

on:
  schedule:
    # Run every midnight US Central Time (6 AM UTC during DST, 7 AM UTC during standard time)
    # Using 6 AM UTC to cover Central Daylight Time
    # Skip weekends to reduce noise and focus on testing during active development days
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      node-version:
        description: "NodeJS Version:"
        type: string
        required: false
        default: "22"
      released-or-latest:
        description: "Use released or latest version"
        type: boolean
        required: false
        default: false
      enable_s6_image:
        description: "Enable S6 image"
        type: boolean
        required: false
        default: true
      example-directory:
        description: "Specific example directory to run (e.g., 'consensus-node-local-build'). Leave empty to run all examples."
        type: string
        required: false
        default: ""
      use-release-example-zip:
        description: "Download example zip from latest release and run from extracted directory."
        type: boolean
        required: false
        default: false
  workflow_call:
    inputs:
      node-version:
        description: "NodeJS Version:"
        type: string
        required: false
        default: "22"
      released-or-latest:
        description: "Use released or latest version"
        type: boolean
        required: false
        default: false
      enable_s6_image:
        description: "Enable S6 image"
        type: boolean
        required: false
        default: true
      example-directory:
        description: "Specific example directory to run (e.g., 'consensus-node-local-build'). Leave empty to run all examples."
        type: string
        required: false
        default: ""
      use-release-example-zip:
        description: "Download example zip from latest release and run from extracted directory."
        type: boolean
        required: false
        default: false
  push:
    branches:
      - trunk-merge/**
defaults:
  run:
    shell: bash

permissions:
  contents: read
  actions: read

env:
  ENABLE_S6_IMAGE: ${{ inputs.enable_s6_image }}
  STEP_TIMEOUT_MINUTES: '5'

jobs:
  generate_matrix:
    name: Generate Test Matrix
    runs-on: hiero-solo-linux-medium
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Generate Matrix
        id: set_matrix
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          EXAMPLE_DIR="${{ inputs.example-directory }}"
          STANDARD_MATRIX_FILE=".github/workflows/support/examples-test-matrix.json"
          TRUNK_MATRIX_FILE=".github/workflows/support/examples-trunkio-matrix.json"
          EVENT_NAME="${{ github.event_name }}"
          REF_NAME="${{ github.ref_name }}"

          if [[ "${EVENT_NAME}" == "push" && "${REF_NAME}" == trunk-merge/* ]]; then
            echo "Detected trunk.io merge queue context (push to ${REF_NAME})."
            SOURCE_MATRIX_JSON=$(cat "${TRUNK_MATRIX_FILE}")
          else
            echo "Non-trunk merge queue context detected (${EVENT_NAME}:${REF_NAME})."
            echo "Using concatenated matrix from standard + trunkio files."
            SOURCE_MATRIX_JSON=$(jq -c -s 'add' "${TRUNK_MATRIX_FILE}" "${STANDARD_MATRIX_FILE}")
          fi
          
          if [ -n "$EXAMPLE_DIR" ]; then
            # Filter to specific example
            echo "Filtering matrix for example directory: $EXAMPLE_DIR"
            JSON_CONTENT=$(echo "${SOURCE_MATRIX_JSON}" | jq -c "[.[] | select(.directory == \"$EXAMPLE_DIR\")]")
            
            if [ "$JSON_CONTENT" = "[]" ]; then
              echo "Error: Example directory '$EXAMPLE_DIR' not found in matrix"
              echo "Available examples:"
              echo "${SOURCE_MATRIX_JSON}" | jq -r '.[].directory'
              exit 1
            fi
          else
            # Use all examples from selected source matrix
            echo "Using all examples from selected matrix source"
            JSON_CONTENT=$(echo "${SOURCE_MATRIX_JSON}" | jq -c .)
          fi
          
          echo "Generated matrix: $JSON_CONTENT"
          
          # Set the output variable 'matrix' with the JSON content
          echo "matrix=$JSON_CONTENT" >> $GITHUB_OUTPUT

  test-examples:
    name: Test Example (${{ matrix.example.name }})
    runs-on: hiero-solo-linux-large
    needs:
      - generate_matrix
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJSON(needs.generate_matrix.outputs.matrix) }}
      max-parallel: 3
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: ${{ inputs.node-version || '22' }}
          cache: npm

      - name: Configure npm registry
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: echo "registry=https://registry.npmjs.org/" > .npmrc

      - name: Install Dependencies
        id: npm-deps
        uses: step-security/retry@38808b4332b98bb36ca031abff0c100231608288 # v4.0.0
        with:
          max_attempts: 10
          timeout_minutes: 10
          command: |
            npm ci

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          go-version: '1.22.3'

      - name: Install grpcurl
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest

      - name: Setup Java
        if: ${{ runner.os == 'linux' && matrix.example.local-java-build && !cancelled() && !failure() }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          distribution: temurin
          java-version: 21.0.1

      - name: Setup Gradle
        if: ${{ runner.os == 'linux' && matrix.example.local-java-build && !cancelled() && !failure() }}
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          cache-read-only: false

      - name: Build Hedera code locally
        if: ${{ runner.os == 'linux' && matrix.example.local-java-build && !cancelled() && !failure() }}
        uses: step-security/retry@38808b4332b98bb36ca031abff0c100231608288 # v4.0.0
        with:
          max_attempts: 3
          timeout_minutes: 30
          command: |
            export CONSENSUS_NODE_VERSION=$(grep 'TEST_LOCAL_HEDERA_PLATFORM_VERSION' version-test.ts | sed -E "s/.*'([^']+)';/\1/")
            cd ..
            git clone https://github.com/hiero-ledger/hiero-consensus-node.git --depth 1 --branch ${CONSENSUS_NODE_VERSION}
            cd hiero-consensus-node
            ls -ltr
            ${{ env.CG_EXEC }} ./gradlew assemble --stacktrace --info || exit 1
            cd ../solo

      - name: Build Application
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: task build:compile

      - name: Cache Helm chart tarballs
        # helm dependency build pulls OCI chart tarballs (e.g. bitnamicharts/redis)
        # directly from registry-1.docker.io on the runner host — the Kind containerd
        # mirror only covers image pulls inside the cluster, not host-side helm pulls.
        # This cache persists ~/.solo/helm-chart-cache ACROSS separate CI runs (not just
        # within the same run), so all chart tarballs (block-node-server, hedera-mirror,
        # hedera-json-rpc, hiero-mirror-node-explorer) are restored in one shot on every
        # subsequent run sharing the same version.ts hash. Docker Hub is contacted at most
        # once per version bump — preventing anonymous rate-limit 429s.
        if: ${{ matrix.example.local-java-build }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.solo/helm-chart-cache
          key: helm-chart-deps-${{ runner.os }}-${{ hashFiles('version.ts') }}
          restore-keys: helm-chart-deps-${{ runner.os }}-

      - name: Prepare Example Directory - ${{ matrix.example.name }}
        id: prepare_example
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          set -euo pipefail

          example_name="${{ matrix.example.directory }}"

          if [ "${{ inputs.use-release-example-zip || 'false' }}" = "true" ]; then
            echo "Using release example zip for: ${example_name}"
            latest_tag="$(curl -fsSL "https://api.github.com/repos/hiero-ledger/solo/releases/latest" | jq -r '.tag_name')"
            if [ -z "${latest_tag}" ] || [ "${latest_tag}" = "null" ]; then
              echo "Failed to resolve latest release tag" >&2
              exit 1
            fi

            release_dir="${RUNNER_TEMP}/release-examples/${example_name}"
            unzip_dir="${release_dir}/unzipped"
            zip_file=""
            zip_url=""
            zip_name=""

            rm -rf "${release_dir}"
            mkdir -p "${release_dir}" "${unzip_dir}"

            for candidate in "example-${example_name}.zip" "${example_name}.zip"; do
              candidate_url="https://github.com/hiero-ledger/solo/releases/download/${latest_tag}/${candidate}"
              candidate_file="${release_dir}/${candidate}"
              echo "Trying download: ${candidate_url}"
              if curl -fsSL --retry 3 --retry-delay 2 -o "${candidate_file}" "${candidate_url}"; then
                zip_name="${candidate}"
                zip_url="${candidate_url}"
                zip_file="${candidate_file}"
                break
              fi
            done

            if [ -z "${zip_file}" ]; then
              echo "Failed to download release zip for ${example_name} from tag ${latest_tag}" >&2
              exit 1
            fi

            unzip -q -o "${zip_file}" -d "${unzip_dir}"

            if [ -f "${unzip_dir}/Taskfile.yml" ]; then
              run_dir="${unzip_dir}"
            else
              taskfile_path="$(find "${unzip_dir}" -maxdepth 3 -type f -name Taskfile.yml | head -n 1)"
              if [ -z "${taskfile_path}" ]; then
                echo "Taskfile.yml not found in extracted zip for ${example_name}" >&2
                exit 1
              fi
              run_dir="$(dirname "${taskfile_path}")"
            fi

            display_dir="release:${latest_tag}/${zip_name} -> ${run_dir}"
          else
            run_dir="${GITHUB_WORKSPACE}/examples/${example_name}"
            display_dir="local:${run_dir}"
          fi

          if [ ! -d "${run_dir}" ]; then
            echo "Resolved run directory does not exist: ${run_dir}" >&2
            exit 1
          fi
          if [ ! -f "${run_dir}/Taskfile.yml" ]; then
            echo "Resolved run directory does not contain Taskfile.yml: ${run_dir}" >&2
            exit 1
          fi

          echo "run_dir=${run_dir}" >> "${GITHUB_OUTPUT}"
          echo "display_dir=${display_dir}" >> "${GITHUB_OUTPUT}"

      - name: Run Example Test - ${{ matrix.example.name }}
        timeout-minutes: 45
        working-directory: ${{ steps.prepare_example.outputs.run_dir }}
        run: |
          export PATH=~/.solo/bin:${PATH}
          echo "Running example: ${{ matrix.example.name }}"
          echo "Resolved example source: ${{ steps.prepare_example.outputs.display_dir }}"
          echo "Current directory: $(pwd)"
          
          # Export environment variables for Taskfile.
          # Release ZIP examples are not executed from the Solo repo checkout, so they must use released Solo CLI.
          if [ "${{ inputs.use-release-example-zip || 'false' }}" = "true" ]; then
            export USE_RELEASED_VERSION="true"
          else
            export USE_RELEASED_VERSION="${{ inputs.released-or-latest || 'false' }}"
          fi
          echo "USE_RELEASED_VERSION: $USE_RELEASED_VERSION"
          
          # Check if Taskfile.yml exists
          if [ ! -f "Taskfile.yml" ]; then
            echo "Warning: No Taskfile.yml found in ${{ matrix.example.directory }}"
            exit 1
          fi
          
          # Run the task in the background and trap SIGTERM/SIGINT so that a workflow
          # cancellation (e.g. triggered by a new commit on this PR) terminates the
          # test immediately rather than waiting up to 45 minutes for it to finish
          # on its own.
          echo "Starting task..."
          export CONSENSUS_NODE_VERSION=$(grep 'TEST_LOCAL_HEDERA_PLATFORM_VERSION' ../../version-test.ts | sed -E "s/.*'([^']+)';/\1/")
          TASK_PID=""
          TASK_PGID=""
          TASK_RC=0

          cleanup() {
            if [[ -n "${TASK_PID}" ]]; then
              echo "Received cancellation signal, stopping task (PID ${TASK_PID}, PGID ${TASK_PGID})..."
              if [[ -n "${TASK_PGID}" ]]; then
                kill -TERM -- "-${TASK_PGID}" 2>/dev/null || true
                sleep 5
                kill -KILL -- "-${TASK_PGID}" 2>/dev/null || true
              else
                kill -TERM "${TASK_PID}" 2>/dev/null || true
                sleep 5
                kill -KILL "${TASK_PID}" 2>/dev/null || true
              fi
              wait "${TASK_PID}" 2>/dev/null || true
            fi
            exit 130
          }
          trap cleanup SIGTERM SIGINT

          if command -v setsid >/dev/null 2>&1; then
            setsid task &
          else
            task &
          fi
          TASK_PID=$!
          TASK_PGID="$(ps -o pgid= -p "${TASK_PID}" | tr -d '[:space:]' || true)"
          wait "${TASK_PID}" || TASK_RC=$?
          TASK_PID=""
          TASK_PGID=""
          trap - SIGTERM SIGINT

          if [ "${TASK_RC}" -ne 0 ]; then
            echo "Task failed with exit code ${TASK_RC}. Collecting deployment diagnostics logs..."
            cd ../..
            npm run solo-test -- deployment diagnostics logs -q --dev || true
            cd "examples/${{ matrix.example.directory }}"

            exit "${TASK_RC}"
          fi

          echo "Task completed successfully"

      - name: Send Slack Notification on Failure
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'schedule' && !cancelled() && failure() }}
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_TEST_WEBHOOK }}
          SLACK_MSG_AUTHOR: Release Engineering
          SLACK_COLOR: danger
          SLACK_TITLE: Example Test Failed
          SLACK_MESSAGE: |
            *Example:* ${{ matrix.example.name }}
            *Directory:* `${{ steps.prepare_example.outputs.display_dir }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* ${{ github.sha }}
            
            :link: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Job Logs>
          SLACK_FOOTER: ${{ github.workflow }}

      - name: Upload Logs to GitHub
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: solo-logs-${{ matrix.example.directory }}
          path: ~/.solo/logs/*
          if-no-files-found: ignore
