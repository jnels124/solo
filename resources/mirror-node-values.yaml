      operator: "Equal"
      value: "linux"
      effect: "NoSchedule"
    - key: "solo-scheduling.io/role"
      operator: "Equal"
      value: "network"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: 0
      memory: 0
    limits:
      cpu: 500m
      memory: 120Mi
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 60
  livenessProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 60
  startupProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 60
