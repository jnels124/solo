name: "Performance Test Solo Deployment"

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main
      - 'release/*'
concurrency:
  # One run per PR or per branch. A new push cancels any in-progress run for
  # the same PR/branch, saving runner resources. workflow_dispatch runs are
  # not cancelled — each manual trigger gets its own group via run_id.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || 'auto' }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: write
  actions: read

env:
  STEP_TIMEOUT_MINUTES: '5'
  KIND_DOCKER_REGISTRY_MIRRORS: ${{ vars.KIND_DOCKER_REGISTRY_MIRRORS }}

jobs:
  performance-test:
    if: >
      ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false ||
      startsWith(github.event.pull_request.title, 'trunk-merge') && !cancelled() && !failure() }}
    timeout-minutes: 90
    runs-on: hiero-solo-linux-large
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}

      - name: Setup Posix Dependencies
        id: set-posix-dependencies
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          # Configure APT to use main Ubuntu archive (disable mirror rotation)
          sudo sed -i 's|http://[a-z.]*.ubuntu.com|http://archive.ubuntu.com|g' /etc/apt/sources.list
          # Install jq (a lightweight and flexible command-line JSON processor)
          sudo apt-get update && sudo apt-get install -y jq

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          node-version: 22

      - name: Install wget
        uses: step-security/retry@38808b4332b98bb36ca031abff0c100231608288 # v4.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          max_attempts: 3
          timeout_minutes: 5
          command: |
            if ! command -v wget >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y wget
            fi

      - name: Install Dependencies
        id: npm-deps
        uses: step-security/retry@38808b4332b98bb36ca031abff0c100231608288 # v4.0.0
        with:
          max_attempts: 10
          timeout_minutes: 10
          command: |
            npm ci

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile Project
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: task build:compile

      - name: Setup E2E Tests
        uses: step-security/retry@38808b4332b98bb36ca031abff0c100231608288 # v4.0.0
        with:
          max_attempts: 3
          timeout_minutes: 10
          command: |
            ./test/e2e/dual-cluster/setup-dual-e2e.sh

      - name: Run E2E Tests
        id: run-e2e-tests
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export PATH=~/.solo/bin:${PATH}
          echo SOLO_TEST_CLUSTER=solo-e2e > .env
          echo ONE_SHOT_WITH_BLOCK_NODE=true >> .env
          echo MIRROR_NODE_PINGER_TPS=10 >> .env
          echo ONE_SHOT_METRICS_TEST_DURATION_IN_MINUTES=5 >> .env
          cat .env

          # Start resource monitoring in background (30s interval for finer granularity)
          ./.github/workflows/script/monitor-resources.sh start 30

          TASK_PID=""
          TASK_PGID=""
          TASK_RC=0
          CANCEL_POLLER_PID=""

          cleanup() {
            if [[ -n "${TASK_PID}" ]]; then
              echo "Received cancellation signal, stopping task (PID ${TASK_PID}, PGID ${TASK_PGID})..."
              if [[ -n "${TASK_PGID}" ]]; then
                kill -TERM -- "-${TASK_PGID}" 2>/dev/null || true
                sleep 5
                kill -KILL -- "-${TASK_PGID}" 2>/dev/null || true
              else
                kill -TERM "${TASK_PID}" 2>/dev/null || true
                sleep 5
                kill -KILL "${TASK_PID}" 2>/dev/null || true
              fi
              wait "${TASK_PID}" 2>/dev/null || true
            fi
            [[ -n "${CANCEL_POLLER_PID}" ]] && kill "${CANCEL_POLLER_PID}" 2>/dev/null || true
            ./.github/workflows/script/monitor-resources.sh stop || true
            exit 130
          }
          trap cleanup SIGTERM SIGINT

          # API poller: polls the run's updated_at field every 30 s and sends
          # SIGTERM to the main shell when GitHub marks the run as cancelled.
          # Self-hosted runners do not deliver SIGTERM to step scripts directly,
          # so this is the only reliable way to detect workflow cancellation.
          # GITHUB_TOKEN is passed explicitly via step env (self-hosted runners
          # do not auto-expose it as a shell variable).
          _run_updated_at() {
            local _api="${GITHUB_API_URL:-https://api.github.com}"
            curl -sf \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "${_api}/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              | jq -r '.updated_at // empty' 2>/dev/null || echo ""
          }
          RUN_UPDATED_AT_INITIAL="$(_run_updated_at)"
          echo "Run updated_at baseline: ${RUN_UPDATED_AT_INITIAL}"

          if command -v setsid >/dev/null 2>&1; then
            setsid task test-e2e-performance &
          else
            task test-e2e-performance &
          fi
          TASK_PID=$!
          TASK_PGID="$(ps -o pgid= -p "${TASK_PID}" | tr -d '[:space:]' || true)"

          # Start poller AFTER TASK_PID is set.
          api_cancel_poller() {
            while true; do
              sleep 30
              current="$(_run_updated_at)"
              if [[ -n "${RUN_UPDATED_AT_INITIAL}" && -n "${current}" \
                    && "${current}" != "${RUN_UPDATED_AT_INITIAL}" ]]; then
                echo "=== API poller: updated_at changed, signalling main shell ==="
                kill -TERM $$ 2>/dev/null || true
                return
              fi
            done
          }
          api_cancel_poller &
          CANCEL_POLLER_PID=$!

          # Sleep-poll instead of blocking wait so SIGTERM from the poller is
          # processed within ≤5 s (bash 4.x queues signals during wait).
          while kill -0 "${TASK_PID}" 2>/dev/null; do
            sleep 5
          done
          kill "${CANCEL_POLLER_PID}" 2>/dev/null || true
          wait "${TASK_PID}" 2>/dev/null
          TASK_RC=$?
          TASK_PID=""
          TASK_PGID=""
          trap - SIGTERM SIGINT

          # Stop resource monitoring and display summary
          ./.github/workflows/script/monitor-resources.sh stop

          if [ "${TASK_RC}" -ne 0 ]; then
            echo "task test-e2e-performance failed with exit code ${TASK_RC}. Collecting deployment diagnostics logs..."
            npm run solo-test -- deployment diagnostics logs -q --dev || true
            exit "${TASK_RC}"
          fi

      - name: Log Metrics
        id: log-metrics
        if: ${{ !cancelled() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          for logFile in ~/.solo/logs/*.json; do
            if [[ -f "$logFile" ]]; then
              echo "::group::JSON Format"
              cat $logFile | jq
              echo "::endgroup::"
              echo "json_log=$(cat $logFile)" >> $GITHUB_OUTPUT
              echo "::group::Spreadsheet Format"
              echo "logFile=$logFile"
              JSON_FILENAME=$logFile ./.github/workflows/script/metrics.sh
              echo "::endgroup::"
            else
              echo "json_log={}" >> $GITHUB_OUTPUT
            fi
          done
          echo "solo_log_dir=$(cd ~/.solo/logs && pwd)" >> $GITHUB_OUTPUT

      - name: Generate ASCII Resource Chart
        id: generate-chart
        if: ${{ !cancelled() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          METRICS_FILE="$HOME/.solo/logs/runner-metrics.jsonl"
          CHART_FILE="$HOME/.solo/logs/runner-metrics-ascii.txt"

          DATA_POINTS=$(wc -l < "$METRICS_FILE" 2>/dev/null | tr -d ' ' || echo "0")
          if [[ -f "$METRICS_FILE" && "$DATA_POINTS" -gt 0 ]]; then
            echo "Generating ASCII chart from ${DATA_POINTS} data points..."
            ./.github/workflows/script/plot-runner-metrics-ascii.sh "$METRICS_FILE" "$CHART_FILE"

            if [[ -f "$CHART_FILE" && -s "$CHART_FILE" ]]; then
              echo "chart_generated=true" >> $GITHUB_OUTPUT
              echo "chart_file=$CHART_FILE" >> $GITHUB_OUTPUT
              MERMAID_FILE="${CHART_FILE%.txt}-mermaid.md"
              CATEGORIES_FILE="${CHART_FILE%.txt}-categories.txt"
              [[ -f "$MERMAID_FILE" ]]    && echo "mermaid_file=$MERMAID_FILE"       >> $GITHUB_OUTPUT
              [[ -f "$CATEGORIES_FILE" ]] && echo "categories_file=$CATEGORIES_FILE" >> $GITHUB_OUTPUT
              echo "✅ ASCII chart generated successfully"
            else
              echo "chart_generated=false" >> $GITHUB_OUTPUT
              echo "⚠️  ASCII chart generation produced no output"
            fi
          else
            echo "chart_generated=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No metrics data collected (${DATA_POINTS} data points), skipping chart generation"
          fi

      - name: Write Runner Resource Usage to Workflow Summary
        if: ${{ !cancelled() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          echo "## Runner Resource Usage — Performance Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.generate-chart.outputs.chart_generated }}" == "true" ]]; then
            CHART_FILE="${{ steps.generate-chart.outputs.chart_file }}"
            if [[ -f "$CHART_FILE" ]]; then
              echo '```' >> $GITHUB_STEP_SUMMARY
              cat "$CHART_FILE" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
            MERMAID_FILE="${{ steps.generate-chart.outputs.mermaid_file }}"
            if [[ -n "$MERMAID_FILE" && -f "$MERMAID_FILE" ]]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Pod Memory Distribution by Category" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              cat "$MERMAID_FILE" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "_No resource metrics collected._" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Write Log Metrics Message File
        id: log-metrics-file
        if: ${{ !cancelled() && !failure() && steps.log-metrics.outputs.json_log != '{}' }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        env:
          LOG_FILE: "${{ steps.log-metrics.outputs.solo_log_dir }}/log_file.md"
          JSON_INPUT: "${{ toJSON(fromJSON(steps.log-metrics.outputs.json_log)) }}"
        run: |
          echo "## Log Metrics - Performance Test" >> $LOG_FILE
          echo "" >> $LOG_FILE

          # Add ASCII resource chart if available
          if [[ "${{ steps.generate-chart.outputs.chart_generated }}" == "true" ]]; then
            CHART_FILE="${{ steps.generate-chart.outputs.chart_file }}"
            if [[ -f "$CHART_FILE" ]]; then
              echo "<details>" >> $LOG_FILE
              echo "<summary>📊 Runner Resource Usage</summary>" >> $LOG_FILE
              echo "" >> $LOG_FILE
              echo '```' >> $LOG_FILE
              cat "$CHART_FILE" >> $LOG_FILE
              echo '```' >> $LOG_FILE
              echo "" >> $LOG_FILE
              echo "</details>" >> $LOG_FILE
              echo "" >> $LOG_FILE
            fi
          fi

          echo "<details>" >> $LOG_FILE
          echo "<summary>" >> $LOG_FILE
          echo "JSON Log Metrics" >> $LOG_FILE
          echo "</summary>" >> $LOG_FILE
          echo '<pre><code class="JSON">' >> $LOG_FILE
          echo "$JSON_INPUT" >> $LOG_FILE
          echo "</code></pre>" >> $LOG_FILE
          echo "</details>" >> $LOG_FILE
          echo "log_file=$LOG_FILE" >> $GITHUB_OUTPUT

      - name: Write Log Metrics to Workflow Summary
        if: ${{ !cancelled() && steps.log-metrics-file.conclusion == 'success' }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          cat "${{ steps.log-metrics-file.outputs.log_file }}" >> $GITHUB_STEP_SUMMARY

      - name: Read Pod Memory Category Table
        id: pod-categories
        if: ${{ !cancelled() && steps.generate-chart.outputs.categories_file != '' }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          CATEGORIES_FILE="${{ steps.generate-chart.outputs.categories_file }}"
          if [[ -f "$CATEGORIES_FILE" ]]; then
            {
              echo "content<<EOF_CATEGORIES"
              cat "$CATEGORIES_FILE"
              echo "EOF_CATEGORIES"
            } >> $GITHUB_OUTPUT
          fi

      - name: Move JVM Memory Usage Data to Metrics Directory
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          mkdir -p ~/.solo/metrics
          if [ -d ~/.solo/logs/performance-tests ]; then
            mv ~/.solo/logs/performance-tests/* ~/.solo/metrics/
            rm -rf ~/.solo/logs/performance-tests
          fi
          # Include the summary JSON in the metrics artifact
          cp ~/.solo/logs/*.json ~/.solo/metrics/ 2>/dev/null || true

      - name: Collect Deployment Diagnostics Logs
        if: ${{ !cancelled() && always() }}
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          export PATH=~/.solo/bin:${PATH}
          npm run solo-test -- deployment diagnostics logs -q --dev || true

      - name: Upload E2E Logs to GitHub
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: solo-performance-test.log
          path: ~/.solo/logs/*
          overwrite: true
          if-no-files-found: error

      - name: Performance Test Verification
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          MAX_MEMORY_MB=11000
          echo "Max memory threshold is set to ${MAX_MEMORY_MB} MB"
          echo "Parsing for the memory usage from the json file"
          MEMORY_USED_MB=$(cat ~/.solo/logs/*.json | jq '.memoryInMebibytes')
          echo "Checking memory usage is less than the threshold"
          if [[ ${MEMORY_USED_MB} =~ ^[0-9]+ ]] && (( ${MEMORY_USED_MB} < ${MAX_MEMORY_MB} )); then
            echo "MEMORY_USED_MB is less than ${MAX_MEMORY_MB} [MB]: MEMORY_USED_MB=${MEMORY_USED_MB} MB"
            exit 0
          else
            echo "Not a valid number or it's >= ${MAX_MEMORY_MB}: MEMORY_USED_MB=${MEMORY_USED_MB} MB"
            exit 1
          fi

      - name: Build and Start Metrics Plotter tool
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          cd ./scripts/metrics-plotter
          npm ci
          npm run build
          mkdir -p ~/.solo/metrics
          mkdir src/data
          nohup npm start &
          echo $! > /tmp/metrics-plotter.pid
          mkdir -p ./src/data       
          cp ~/.solo/logs/**/timeline-metrics.json ./src/data/timeline.json

      - name: Install Puppeteer / Chrome dependencies
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libatspi2.0-0 \
            libcairo2 \
            libdbus-1-3 \
            libgdk-pixbuf2.0-0 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            lsb-release \
            xdg-utils \
            libgbm1

      - name: Save Screenshots of Metrics Plotter
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          cd ./scripts/metrics-plotter
          SCREENSHOT_WIDTH=1920 npm run screenshot -- http://127.0.0.1:8123\?hide-controls=true\&grouped=true\&data=timeline ~/.solo/metrics/chart-grouped.png
          SCREENSHOT_WIDTH=1920 npm run screenshot -- http://127.0.0.1:8123\?hide-controls=true\&grouped=false\&data=timeline ~/.solo/metrics/chart.png
          cp ./src/data/timeline.json ~/.solo/metrics/timeline-metrics.json

      - name: Stop Metrics Plotter tool
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        run: |
          if [ -f /tmp/metrics-plotter.pid ]; then
            kill $(cat /tmp/metrics-plotter.pid) || true
            rm /tmp/metrics-plotter.pid
          fi

      - name: Upload Metrics Data and Chart to GitHub
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: ${{ fromJSON(env.STEP_TIMEOUT_MINUTES) }}
        with:
          name: solo-performance-chart
          path: ~/.solo/metrics/*
          overwrite: true
          if-no-files-found: error
