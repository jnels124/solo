labels:
  solo.hiero.com/testSuiteName: ""
  solo.hiero.com/testName: ""
  solo.hiero.com/testRunUID: ""
  solo.hiero.com/testCreationTimestamp: ""
  solo.hiero.com/testExpirationTimestamp: ""
  solo.hiero.com/testRequester: ""
graphql: # not needed for default use case
  enabled: false
rosetta: # not needed for default use case
  enabled: false
redis:
  enabled: true
#  namespaceOverride: "{{ tpl (.Values.global.namespaceOverride | toString) }}"
# importer is a component of the hiero mirror node
# config for subchart hiero-mirror/importer
importer:
  image:
    registry: ghcr.io
    repository: hiero-ledger/hiero-mirror-node/importer
  nodeSelector: {}
  tolerations:
    - key: "solo-scheduling.io/os"
      operator: "Equal"
      value: "linux"
      effect: "NoSchedule"
    - key: "solo-scheduling.io/role"
      operator: "Equal"
      value: "network"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: 0
      memory: 0
    limits:
      cpu: 1000m
      memory: 300Mi
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 60
  livenessProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 60
  startupProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 300
  envFrom:
    - secretRef:
        name: mirror-passwords
    - secretRef:
        name: "{{ .Release.Name }}-redis"
    - secretRef:
        name: uploader-mirror-secrets
  # The addressbook.bin file updates will be handled by infrastructure code or solo
  addressBook: ""
  config:
    # importer is a springboot app, its application.yaml configuration starts here
    # This config is mounted at [/usr/etc/hiero/application.yaml] in the importer pod
    hiero:
      mirror:
        importer:
          startDate: 1970-01-01T00:00:00Z
          network: other
          downloader:
            allowAnonymousAccess: false
            bucketName: "solo-streams"
            # for s3 configuration of mirror node look at uploader-mirror-secrets.yaml
          parser:
            record:
              entity:
                persist:
                  pendingReward: false
              sidecar:
                enabled: true
grpc:
  image:
    registry: ghcr.io
    repository: hiero-ledger/hiero-mirror-node/grpc
  ingress:
    annotations:
      haproxy-ingress.github.io/backend-protocol: h2
  nodeSelector: {}
  tolerations:
    - key: "solo-scheduling.io/os"
      operator: "Equal"
      value: "linux"
      effect: "NoSchedule"
    - key: "solo-scheduling.io/role"
      operator: "Equal"
      value: "network"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: 0
      memory: 0
    limits:
      cpu: 500m
      memory: 200Mi
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 60
  livenessProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 60
  startupProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 60
pinger:
  enabled: true
  resources:
    requests:
      cpu: 0
      memory: 0
    limits:
      cpu: 100m
      memory: 15Mi
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 60
  livenessProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 60
  startupProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    failureThreshold: 60
postgresql:
